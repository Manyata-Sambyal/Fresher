<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fresher Fiesta</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-image: url("https://images.pexels.com/photos/459301/pexels-photo-459301.jpeg");
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: rgba(0, 0, 0, 0.6);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      width: 300px;
    }

    h1 {
      color: #fff;
      margin-bottom: 10px;
      font-size: 32px;
    }

    p {
      color: #ddd;
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 90%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      margin-bottom: 15px;
      font-size: 14px;
    }

    button {
      background: #ff4d6d;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff1e4d;
      transform: scale(1.05);
    }

    a {
      display: block;
      margin-top: 15px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      opacity: 0.8;
    }

    a:hover {
      opacity: 1;
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>Fresher Fiesta 🎉</h1>
    <p>Welcome! Enter your name to get your invitation</p>

    <form action="invitation.html" method="GET">
      <input type="text" name="username" placeholder="Enter your name" required>
      <br>
      <button type="submit">Get Invitation</button>
    </form>

  </div>

</body>
</html>
