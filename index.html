<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fresher Fiesta</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* Party background image with light dark overlay */
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
        url("https://images.pexels.com/photos/3171837/pexels-photo-3171837.jpeg")
          center/cover no-repeat;
      overflow: hidden;
      position: relative;
    }

    /* Floating light orbs for subtle animation */
    .orbs {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .orb {
      position: absolute;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.9), transparent 60%);
      opacity: 0.15;
      filter: blur(1px);
      animation: floatOrb 18s linear infinite;
    }

    .orb:nth-child(1) { left: 8%;  bottom: -20%; animation-delay: 0s;  animation-duration: 22s; }
    .orb:nth-child(2) { left: 30%; bottom: -25%; animation-delay: 4s;  animation-duration: 20s; }
    .orb:nth-child(3) { left: 60%; bottom: -18%; animation-delay: 8s;  animation-duration: 24s; }
    .orb:nth-child(4) { left: 80%; bottom: -22%; animation-delay: 2s;  animation-duration: 26s; }

    @keyframes floatOrb {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      20%  { opacity: 0.2; }
      80%  { opacity: 0.2; }
      100% { transform: translateY(-120vh) translateX(20px); opacity: 0; }
    }

    .container {
      /* Black & gold card */
      background: radial-gradient(circle at top left, #222 0%, #050505 55%, #000 100%);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
      width: 320px;

      box-shadow:
        0 0 26px rgba(0, 0, 0, 0.95),
        0 18px 40px rgba(0, 0, 0, 0.95);
      position: relative;
      z-index: 1;

      /* Fade-in transition */
      opacity: 0;
      transform: translateY(20px) scale(0.97);
      animation: fadeInCard 1.2s ease-out forwards;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 22px;
      background: conic-gradient(
        from 180deg,
        #f5d270,
        #f3b43d,
        #b88624,
        #f7e7ad,
        #f5d270
      );
      opacity: 0.65;
      z-index: -2;
    }

    .container::after {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: 18px;
      background: radial-gradient(circle at top, rgba(255,255,255,0.06), rgba(0,0,0,0.95));
      z-index: -1;
    }

    @keyframes fadeInCard {
      0% {
        opacity: 0;
        transform: translateY(20px) scale(0.97);
      }
      60% {
        opacity: 1;
        transform: translateY(0) scale(1.01);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    h1 {
      color: #fff8dc;
      margin-bottom: 10px;
      font-size: 32px;
      letter-spacing: 1px;
    }

    p {
      color: #f5e9c9;
      margin-bottom: 20px;
      font-size: 14px;
    }

    input[type="text"] {
      width: 90%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #f5d270;
      outline: none;
      margin-bottom: 15px;
      font-size: 14px;
      background: rgba(0,0,0,0.7);
      color: #f5e9c9;
    }

    input[type="text"]::placeholder {
      color: #c4b37a;
    }

    button {
      background: linear-gradient(135deg, #f3b43d, #b88624);
      color: #1b1203;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(0,0,0,0.7);
    }

    button:hover {
      background: linear-gradient(135deg, #f7d15b, #d49a2b);
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 12px 26px rgba(0,0,0,0.9);
    }

    a {
      display: block;
      margin-top: 15px;
      color: #f0e2b8;
      text-decoration: none;
      font-size: 14px;
      opacity: 0.85;
    }

    a:hover {
      opacity: 1;
    }

  </style>
</head>

<body>

  <!-- Animated background orbs -->
  <div class="orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <div class="container">
    <h1>Fresher Fiesta 🎉</h1>
    <p>Welcome! Enter your name to get your invitation</p>

    <form action="invitation.html" method="GET">
      <input type="text" name="username" placeholder="Enter your name" required>
      <br>
      <button type="submit">Get Invitation</button>
    </form>
  </div>

</body>
</html>
